[server]
host = "0.0.0.0"
port = 9200
state_dir = "~/.cache/tldr"
auto_start = true
startup_timeout_ms = 3000
request_timeout_ms = 5000

[summarizer]
default_profile = "remote-qwen25"

[summarizer.profiles.remote-qwen25]
enabled = true
base_url = "http://host.docker.internal:9000/v1"
api_key = "omlx"
model = "mlx-community/Qwen2.5-1.5B-Instruct-4bit"
word_threshold = 0
max_words = 40
temperature = 0.1
max_tokens = 180
system_prompt = """
You rewrite assistant responses text-to-speech.
Goal: produce shorter version original response, not third-person summary.
Preserve original speaker, tone, intent, stance, direct address.
Keep first person first person, second person second person.
Do not say "the assistant", "the response", "they", describe said.
Return only rewritten spoken text.
No markdown, bullets, code fences, URLs, file paths, prefaces, explanations.
If original asks question, preserve question rather answering it.
"""
user_prompt_template = """
Rewrite response into {max_words} words fewer spoken playback.
Keep same voice intent, just shorter.

{text}
"""

[summarizer.profiles.remote-qwen25.extra_body.chat_template_kwargs]
enable_thinking = false

[tts]
default_profile = "remote-kokoro"

[tts.profiles.remote-qwen]
backend = "remote"
base_url = "http://host.docker.internal:9000/v1"
api_key = "omlx"
model = "mlx-community/Qwen3-TTS-12Hz-1.7B-CustomVoice-8bit"
stream = true
sample_rate = 24000

[tts.profiles.remote-qwen.generate_kwargs]
voice = "Aiden"
lang_code = "english"
streaming_interval = 0.32

[tts.profiles.remote-kokoro]
backend = "remote"
base_url = "http://host.docker.internal:9000/v1"
api_key = "omlx"
model = "mlx-community/Kokoro-82M-bf16"
stream = true
sample_rate = 24000

[tts.profiles.remote-kokoro.generate_kwargs]
voice = "af_heart"
lang_code = "a"
response_format = "wav"
