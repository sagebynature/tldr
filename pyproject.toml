[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tts-summarizer"
version = "0.0.1"
description = "Harness-neutral local TTS summarizer daemon using MLX"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "sagebynature" }]
dependencies = [
  "mlx-lm; platform_system == 'Darwin' and platform_machine == 'arm64'",
  "mlx-audio; platform_system == 'Darwin' and platform_machine == 'arm64'",
  "colorlog>=6.10.1",
  "numpy",
]

[dependency-groups]
dev = ["ty==0.0.23", "ruff>=0.5"]

[project.scripts]
tts-summarizer = "tts_summarizer.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/tts_summarizer"]
force-include = { "src/tts_summarizer/logging.conf" = "tts_summarizer/logging.conf" }

[tool.hatch.build.targets.sdist]
include = [
  "src",
  "tests",
  "README.md",
  "CHANGELOG.md",
  "config.example.toml",
  "Makefile",
]

[tool.ty.environment]
root = ["src"]

[tool.semantic_release]
version_toml = ["pyproject.toml:project.version"]
major_on_zero = true
upload_to_pypi = false
commit_message = "{version}\n\n[skip ci]"

[tool.semantic_release.branches.main]
