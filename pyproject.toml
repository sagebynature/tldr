[project]
name = "tts-summarizer"
version = "0.1.0"
description = "Harness-neutral local TTS summarizer daemon using MLX"
requires-python = ">=3.11"
dependencies = [
  "mlx-lm",
  "mlx-audio",
  "numpy",
]

[project.scripts]
tts-summarizer = "tts_summarizer.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
