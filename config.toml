[server]
host = "127.0.0.1"
port = 9200
state_dir = "~/.cache/tts-summarizer"
auto_start = true
startup_timeout_ms = 3000
request_timeout_ms = 5000

[summarizer]
default_profile = "qwen25"

[summarizer.profiles.qwen25]
enabled = true
base_url = "http://127.0.0.1:9000/v1"
api_key = "omlx"
model = "mlx-community/Qwen2.5-1.5B-Instruct-4bit"
word_threshold = 0
max_words = 40
temperature = 0.1
max_tokens = 180
system_prompt = """
You rewrite assistant responses for text-to-speech.

Goal: produce a shorter version of the original response, not a third-person summary.
Preserve the original speaker, tone, intent, stance, and direct address.
Keep first person as first person, second person as second person.
Do not say "the assistant", "the response", "they", or describe what was said.
Return only the rewritten spoken text.
No markdown, bullets, code fences, URLs, file paths, prefaces, or explanations.
If the original asks a question, preserve the question rather than answering it.
"""
user_prompt_template = """
Rewrite this response into {max_words} words or fewer for spoken playback.
Keep the same voice and intent, just shorter.

{text}
"""

[summarizer.profiles.qwen25.extra_body.chat_template_kwargs]
enable_thinking = false

[tts]
default_profile = "remote-qwen"

[tts.profiles.qwen]
model = "mlx-community/Qwen3-TTS-12Hz-1.7B-CustomVoice-8bit"
stream = true
sample_rate = 24000

[tts.profiles.qwen.generate_kwargs]
voice = "Aiden"
lang_code = "english"
streaming_interval = 0.32

[tts.profiles.remote-qwen]
backend = "remote"
base_url = "http://127.0.0.1:9000/v1"
api_key = "omlx"
model = "mlx-community/Qwen3-TTS-12Hz-1.7B-CustomVoice-8bit"
stream = true
sample_rate = 24000

[tts.profiles.remote-qwen.generate_kwargs]
voice = "Aiden"
lang_code = "english"
streaming_interval = 0.32

[tts.profiles.kokoro]
model = "mlx-community/Kokoro-82M-bf16"
stream = true
sample_rate = 24000

[tts.profiles.kokoro.generate_kwargs]
voice = "af_alloy"
lang_code = "a"
speed = 1.3

[tts.profiles.remote-kokoro]
backend = "remote"
base_url = "http://127.0.0.1:9000/v1"
api_key = "omlx"
model = "mlx-community/Kokoro-82M-bf16"
stream = true
sample_rate = 24000

[tts.profiles.remote-kokoro.generate_kwargs]
voice = "af_heart"
lang_code = "a"
response_format = "wav"
